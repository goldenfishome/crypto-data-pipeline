version: 2

models:
  - name: dim_coin
    description: "Coin dimension — one row per unique coin tracked by the pipeline."
    columns:
      - name: coin_key
        description: "Surrogate key (MD5 of coin_id)."
        tests: [unique, not_null]
      - name: coin_id
        description: "CoinGecko natural key (e.g. bitcoin)."
        tests: [unique, not_null]
      - name: symbol
        tests: [not_null]
      - name: first_seen_date
        tests: [not_null]

  - name: dim_date
    description: "Date dimension — one row per calendar day from 2024-01-01 to today."
    columns:
      - name: date_key
        description: "Surrogate key (MD5 of full_date)."
        tests: [unique, not_null]
      - name: full_date
        tests: [unique, not_null]
      - name: year
        tests: [not_null]
      - name: is_weekend
        tests: [not_null]

  - name: dim_sentiment
    description: "Sentiment dimension — one row per day of Fear & Greed data."
    columns:
      - name: sentiment_key
        description: "Surrogate key (MD5 of score_date)."
        tests: [unique, not_null]
      - name: score_date
        tests: [unique, not_null]
      - name: score
        tests: [not_null]
      - name: classification
        tests:
          - not_null
          - accepted_values:
              values: ["Extreme Fear", "Fear", "Neutral", "Greed", "Extreme Greed"]

  - name: fact_trades
    description: >
      Daily grain fact table. One row per coin per day.
      Joins market metrics (CoinGecko + Binance) with all three dimensions.
    columns:
      - name: trade_id
        description: "Surrogate key (MD5 of coin_id + market_date)."
        tests: [unique, not_null]
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: coin_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_coin')
              field: coin_key
      - name: open_price
        tests: [not_null]
      - name: close_price
        tests: [not_null]
      - name: volume_usd
        tests: [not_null]
      - name: market_cap_usd
        tests: [not_null]

version: 2

models:
  - name: int_daily_ohlcv
    description: >
      Binance trade ticks aggregated to daily OHLCV per symbol.
      Only covers the 3 Binance pairs (BTC, ETH, SOL).
    columns:
      - name: symbol
        tests: [not_null]
      - name: trade_date
        tests: [not_null]
      - name: open_price
        tests: [not_null]
      - name: vwap
        tests: [not_null]

  - name: int_coin_daily_metrics
    description: >
      One row per coin per day. Merges CoinGecko (20 coins) with Binance
      tick-derived OHLCV (BTC/ETH/SOL). Includes 7-day rolling average price.
    columns:
      - name: coin_id
        tests: [not_null]
      - name: market_date
        tests: [not_null]
      - name: close_price
        tests: [not_null]
      - name: market_cap_usd
        tests: [not_null]
